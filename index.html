            flex-shrink: 0; display: flex; justify-content: center;
        }

        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; width: 95%; max-width: 1200px; }
        .logo-header { max-width: 90px; height: auto; transition: max-width 0.3s ease; }
        .subtitle { font-family: 'Oswald', sans-serif; font-size: 1.2rem; color: var(--branco); letter-spacing: 1px; background-color: var(--azul-fortaleza); border: 2px solid var(--vermelho-fortaleza); padding: 4px 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .container { width: 95%; max-width: 1200px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 5px 0; }
        .aviso-transmissao { width: 100%; background-color: rgba(0, 0, 0, 0.4); color: var(--branco); padding: 10px 20px; border-radius: 8px; margin-bottom: 10px; font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; border-left: 5px solid var(--vermelho-fortaleza); box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; }
        
        .player-container {
            position: relative; width: 100%; max-height: 48vh; aspect-ratio: 16 / 9;
            margin: 0 auto; background: #000; border: 4px solid var(--azul-fortaleza);
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden; flex-shrink: 1;
        }

        #dinamic-player-wrapper, #dinamic-player-wrapper video, #dinamic-player-wrapper iframe {
            width: 100% !important;
            height: 100% !important;
            position: absolute; top: 0; left: 0;
            border: none; outline: none;
        }

        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 15px; width: 100%; flex-wrap: wrap; }
        .btn-player { font-family: 'Oswald', sans-serif; background-color: var(--vermelho-fortaleza); color: white; border: 2px solid transparent; padding: 10px 30px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex: 1 1 auto; max-width: 250px; }
        .btn-player:hover, .btn-player:focus { background-color: #b3050f; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.4); outline: none; border: 2px solid var(--amarelo-alerta); }
        .btn-player.active { background-color: var(--azul-fortaleza); border: 2px solid var(--branco); box-shadow: 0 0 15px rgba(0, 81, 158, 0.6); }
        
        footer { width: 100%; padding: 12px; background-color: rgba(0, 0, 0, 0.4); color: #ccc; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .social-container { display: flex; align-items: center; gap: 15px; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 1.1rem; color: var(--branco); }
        .social-link { color: var(--branco); font-size: 1.6rem; text-decoration: none; transition: transform 0.3s ease, color 0.3s ease; display: flex; align-items: center; }
        .social-link.twitter:hover { color: #1DA1F2; transform: scale(1.15) translateY(-2px); }
        .social-link.whatsapp:hover { color: #25D366; transform: scale(1.15) translateY(-2px); }
        .footer-text { font-size: 0.8em; color: #aaa; }
        
        @media (max-width: 768px) { body { height: auto; min-height: 100vh; overflow-y: auto; } .header-content { flex-direction: column; gap: 10px; } .subtitle { font-size: 1rem; padding: 4px 10px; text-align: center; } .aviso-transmissao { font-size: 0.9rem; padding: 10px 15px; } .player-container { max-height: none; } .controls { gap: 10px; } .btn-player { flex-basis: 100%; max-width: 100%; padding: 15px; font-size: 1.2rem; } }
        @media (min-width: 1600px) { .logo-header { max-width: 130px; } .subtitle { font-size: 1.6rem; padding: 8px 18px; } .aviso-transmissao { font-size: 1.2rem; padding: 15px 25px; margin-bottom: 20px; } .player-container { max-height: 55vh; } .btn-player { padding: 15px 40px; font-size: 1.4rem; max-width: 350px; border-radius: 12px; } .social-container { font-size: 1.4rem; } .social-link { font-size: 2rem; } .footer-text { font-size: 1rem; } }

<script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false;
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    }

    let hlsInstance = null; 
    let currentPlayerInstance = null;

    function changePlayer(encodedUrl, tipoPlayer, btn) {
        const container = document.getElementById('container-do-player');
        
        let url = "";
        try {
            url = atob(encodedUrl);
        } catch(e) {
            console.error("Link Base64 inválido.");
            return;
        }
        
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (currentPlayerInstance) {
            if (typeof currentPlayerInstance.destroy === 'function') currentPlayerInstance.destroy();
            if (typeof currentPlayerInstance.dispose === 'function') currentPlayerInstance.dispose();
            currentPlayerInstance = null;
        }

        container.innerHTML = '<div id="dinamic-player-wrapper"></div>';
        const wrapper = document.getElementById('dinamic-player-wrapper');

        const buttons = document.querySelectorAll('.btn-player');
        buttons.forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        if (tipoPlayer === 0) {
            wrapper.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>`;
        } 
        else if (tipoPlayer === 1) {
            wrapper.innerHTML = `<video id="video-nativo" controls autoplay playsinline></video>`;
            const video = document.getElementById('video-nativo');
            
            if (Hls.isSupported() && url.includes('.m3u8')) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Erro autoplay"));
                });
            } else {
                video.src = url;
                video.play();
            }
        } 
        else if (tipoPlayer === 2) {
            currentPlayerInstance = new Clappr.Player({
                source: url,
                parentId: "#dinamic-player-wrapper",
                autoPlay: true,
                width: '100%',
                height: '100%',
                shakaConfiguration: { preferredAudioLanguage: 'pt-BR' }
            });
        } 
        else if (tipoPlayer === 3) {
            currentPlayerInstance = new DPlayer({
                container: wrapper,
                autoplay: true,
                video: {
                    url: url,
                    type: url.includes('.m3u8') ? 'hls' : 'auto'
                }
            });
        } 
        else if (tipoPlayer === 4) {
            wrapper.innerHTML = `<video id="vjs-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay playsinline preload="auto"></video>`;
            currentPlayerInstance = videojs('vjs-video', {
                autoplay: true,
                sources: [{ src: url }]
            });
        }
    }
